name: East of Inch Pulse

on:
  # Scheduling handled by the eoi-cron Cloudflare Worker (more reliable than GH cron).
  workflow_dispatch:

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pulse
        env:
          AI_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          SUPABASE_URL: https://nfpdtjqncwibgyrzvffr.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOI_BUCKET: eoi
          # Route through the CF Worker proxy — GH Actions runner IPs hit
          # Indiachan with 403 if they connect directly.
          IMAGEBOARD_BASE: https://induschan-proxy.asphocal.workers.dev
        run: python pulse.py
