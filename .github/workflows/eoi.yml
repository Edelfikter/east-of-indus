name: East of Indus

on:
  # Scheduling is done exclusively by the eoi-cron Cloudflare Worker calling
  # workflow_dispatch on this workflow. GitHub Actions native cron is too
  # unreliable on the free tier (delayed runs caused duplicate issues per day).
  workflow_dispatch:

permissions:
  contents: write           # so the job can commit the archived issue back to the repo

jobs:
  publish-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape Induschan
        run: python scrape.py

      - name: Compose issue
        env:
          AI_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: meta-llama/llama-4-scout-17b-16e-instruct
          # Read-only fetches: cooldown (covered_threads.json), guest dedup,
          # quote dedup. No service-role key needed for public reads.
          SUPABASE_URL: https://nfpdtjqncwibgyrzvffr.supabase.co
          EOI_BUCKET: eoi
        run: python compose.py

      - name: Publish to Supabase
        env:
          SUPABASE_URL: https://nfpdtjqncwibgyrzvffr.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOI_BUCKET: eoi
        run: python publish.py

      - name: Commit archive
        run: |
          git config user.name 'eoi-bot'
          git config user.email 'eoi-bot@users.noreply.github.com'
          git add data/issue_*.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "issue $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No new issue to commit."
          fi
