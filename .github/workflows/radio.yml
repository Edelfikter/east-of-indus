name: inch-radio

# Triggered by the eoi-cron Cloudflare worker (workflow_dispatch) ~30-45 min
# before each block window, so the broadcast stays fresh. Generates a block,
# renders it (William + guest voice, stitched with ffmpeg), and publishes to
# the Supabase `radio` bucket.
on:
  workflow_dispatch:

jobs:
  broadcast:
    runs-on: ubuntu-latest
    # Generation now paces itself against the 12k tokens/min cap (groq_limits.py),
    # so a block takes ~3 min instead of ~1, on top of TTS render + ffmpeg stitch.
    timeout-minutes: 30
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      # Route through the CF Worker proxy — GH Actions runner IPs hit
      # Indiachan with 403 if they connect directly.
      IMAGEBOARD_BASE: https://induschan-proxy.asphocal.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install deps
        run: pip install -r radio/requirements.txt
      - name: Generate, render, and publish a block
        run: python -m radio.run_block
